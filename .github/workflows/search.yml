name: Search Daangn regions

on:
  schedule:
    # Recovery sweep for queued/running requests left by cancellations or replaced pending runs.
    - cron: "17,47 * * * *"
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      process_open_issue:
        description: Drain queued issue requests instead of a direct crawl
        required: true
        type: boolean
        default: false
      query:
        description: Search phrase
        required: true
        default: 갤럭시 폴드 7
      provinces:
        description: Comma-separated provinces
        required: true
        default: 서울특별시,경기도
      max_regions:
        description: Maximum regions; 0 means all
        required: true
        default: "0"

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  acknowledge:
    if: >-
      (github.event_name == 'issues' &&
        github.event.sender.type != 'Bot' && (
          github.event.issue.author_association == 'OWNER' ||
          github.event.issue.author_association == 'MEMBER' ||
          github.event.issue.author_association == 'COLLABORATOR'
        )) ||
      (github.event_name == 'issue_comment' &&
        !github.event.issue.pull_request &&
        github.event.issue.state == 'open' &&
        github.event.comment.user.type != 'Bot' && (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        ))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: dgsearch-ack-${{ github.event_name }}-${{ github.event.comment.id || github.event.issue.id }}-${{ github.event.action }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
      - name: Acknowledge request
        uses: actions/github-script@v9
        with:
          script: |
            const acknowledge = require("./.github/scripts/acknowledge.cjs");
            return await acknowledge({ github, context, core });

  search:
    if: >-
      always() && (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        (github.event_name == 'issues' &&
          github.event.sender.type != 'Bot' && (
            github.event.issue.author_association == 'OWNER' ||
            github.event.issue.author_association == 'MEMBER' ||
            github.event.issue.author_association == 'COLLABORATOR'
          )) ||
        (github.event_name == 'issue_comment' &&
          !github.event.issue.pull_request &&
          github.event.issue.state == 'open' &&
          github.event.comment.user.type != 'Bot' && (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          ))
      )
    needs: acknowledge
    runs-on: ubuntu-latest
    concurrency:
      group: dgsearch-issue-worker
      cancel-in-progress: false
      queue: max
    # Leave time after the Python worker budget for status and artifact finalization.
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install .
      - name: Crawl
        if: github.event_name == 'workflow_dispatch' && !inputs.process_open_issue
        env:
          SEARCH_QUERY: ${{ inputs.query }}
          SEARCH_PROVINCES: ${{ inputs.provinces }}
          SEARCH_MAX_REGIONS: ${{ inputs.max_regions }}
        run: |
          scrapy crawl daangn \
            -a "query=$SEARCH_QUERY" \
            -a "provinces=$SEARCH_PROVINCES" \
            -a "max_regions=$SEARCH_MAX_REGIONS"
      - name: Drain queued issue requests
        if: github.event_name == 'issues' || github.event_name == 'issue_comment' || github.event_name == 'schedule' || inputs.process_open_issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DGSEARCH_MAX_REGIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_regions || '0' }}
          DGSEARCH_MAX_COMMENT_RESULTS: "50"
          DGSEARCH_PROGRESS_UPDATE_INTERVAL_SECONDS: "30"
          DGSEARCH_MAX_REQUESTS_PER_RUN: "3"
          # Handoff at four hours, leaving ample time before the hosted-runner limit.
          DGSEARCH_REQUEST_TIMEOUT_SECONDS: "14400"
          DGSEARCH_WORKER_BUDGET_SECONDS: "18000"
          DGSEARCH_WORKER_CLEANUP_RESERVE_SECONDS: "900"
          DGSEARCH_ACK_GRACE_SECONDS: "60"
          DGSEARCH_MAX_HANDOFFS: "12"
          GITHUB_WORKFLOW_FILE: "search.yml"
        run: python scripts/process_issues.py
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dgsearch-${{ github.run_id }}
          path: output/
          if-no-files-found: warn
          retention-days: 3
