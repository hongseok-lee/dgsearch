name: Search Daangn regions

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      process_open_issue:
        description: Process the oldest unhandled open issue instead of a direct crawl
        required: true
        type: boolean
        default: false
      query:
        description: Search phrase
        required: true
        default: 갤럭시 폴드 7
      provinces:
        description: Comma-separated provinces
        required: true
        default: 서울특별시,경기도
      max_regions:
        description: Maximum regions; 0 means all
        required: true
        default: "100"

permissions:
  contents: read
  issues: write

concurrency:
  group: dgsearch-issue-worker
  cancel-in-progress: false

jobs:
  search:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && (
        github.event.issue.author_association == 'OWNER' ||
        github.event.issue.author_association == 'MEMBER' ||
        github.event.issue.author_association == 'COLLABORATOR'
      )) ||
      (github.event_name == 'issue_comment' && !github.event.issue.pull_request && (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install .
      - name: Crawl
        if: github.event_name == 'workflow_dispatch' && !inputs.process_open_issue
        env:
          SEARCH_QUERY: ${{ inputs.query }}
          SEARCH_PROVINCES: ${{ inputs.provinces }}
          SEARCH_MAX_REGIONS: ${{ inputs.max_regions }}
        run: |
          scrapy crawl daangn \
            -a "query=$SEARCH_QUERY" \
            -a "provinces=$SEARCH_PROVINCES" \
            -a "max_regions=$SEARCH_MAX_REGIONS"
      - name: Process oldest unhandled open issue
        if: github.event_name == 'issues' || github.event_name == 'issue_comment' || inputs.process_open_issue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DGSEARCH_MAX_REGIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_regions || '300' }}
          DGSEARCH_MAX_COMMENT_RESULTS: "50"
        run: python scripts/process_issues.py
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dgsearch-${{ github.run_id }}
          path: output/
          if-no-files-found: warn
          retention-days: 3
