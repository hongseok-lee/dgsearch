name: Search Daangn regions

on:
  issue_comment:
    types: [created]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      process_open_issue:
        description: Process the oldest unhandled open issue instead of a direct crawl
        required: true
        type: boolean
        default: false
      query:
        description: Search phrase
        required: true
        default: 갤럭시 폴드 7
      provinces:
        description: Comma-separated provinces
        required: true
        default: 서울특별시,경기도
      max_regions:
        description: Maximum regions; 0 means all
        required: true
        default: "100"

permissions:
  contents: read
  issues: write

concurrency:
  group: dgsearch-issue-worker
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install .
      - name: Run Python action
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python -m dgsearch.action
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dgsearch-${{ github.run_id }}
          path: output/
          if-no-files-found: warn
          retention-days: 3
